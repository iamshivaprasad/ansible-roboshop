- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-09c813fb71547fc4f
    sg_id: sg-0cbd4d3b40fa4e1e2 # security group id
    zone_id: "Z04484812P5RP9I48MRRL" # route53 zone id
    domain_name: "shivaprasad.fun"
    # we can pass instances through command line using -e
    instance:
      - mongodb
      #- redis
      #- mysql
      #- rabbitmq
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2: # to create ec2 instance using amazon.aws.ec2 module
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instance }}"
    register: ec2_output

  - name: print ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}" # to print the output of the ec2 module stored in the variable ec2_output