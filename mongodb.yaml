- name: setup mongodb
  hosts: mongodb
  become: true
  tasks:
  - name: copy mongodb.repo file
    ansible.builtin.copy: # copy module is used to copy files from local to remote
      src: monogo.repo
      dest: /etc/yum.repos.d/mongodb.repo

  - name: install mongodb
    ansible.builtin.package:
      name: mongodb-org
      state: present
    
  - name: start and enable services
    ansible.builtin.service:
      name: mongod
      state: started
      enabled: yes

  - name: allow remote connections
    ansible.builtin.replace:
     path: /etc/mongod.conf
     regexp: '127.0.0.1'
     replace: '0.0.0.0'

  - name: restart mongodb
    ansible.builtin.service:
     name: mongod
     state: restarted