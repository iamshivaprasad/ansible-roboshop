- name: setup catalogue service
  hosts: catalogue
  become: true
  tasks:
  - name: disable default nodejs module
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      state: present
      comment: "RoboShop System User"
      system: true
      shell: /sbin/nologin
      home: /app
  # remove app directory if exists because 2nd time if we run it will download freshly. no error if does not exist
  - name: remove app directory if exists
    ansible.builtin.file:
      path: /app
      state: absent  

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app

  - name: remove catalogue zip file if exists
    ansible.builtin.file:
      state: absent
      path: /tmp/catalogue.zip

  - name: download catalogue code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: unzip catalogue code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
      
  - name: install dependencies
    community.general.npm:
      path: /app
      state: present

  - name: copy catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongodb repo
    ansible.builtin.copy: # copy module is used to copy files from local to remote
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-mongosh
      state: present

  - name: connect to mongodb catalogue
    ansible.builtin.command: mongosh mongodb.shivaprasad.fun --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
    register: catalogue_output

  # - name: evaluate catalogue database
  #   community.mongodb.mongodb_shell:
  #     login_host: mongodb.shivaprasad.fun # we can also use IP address instead of hostname
  #     eval: "db.getMongo().getDBNames().indexOf('catalogue')"
  #   register: catalogue_output


  # - name: print catalogue output
  #   ansible.builtin.debug:
  #     msg: "{{ catalogue_output }}"

  - name: load products into mongodb
    ansible.builtin.shell: mongosh --host mongodb.shivaprasad.fun </app/db/master-data.js
    when: catalogue_output.stdout | int < 0 # if catalogue database is not present then only load the data

  - name: daemon reload enable and start
    ansible.builtin.systemd_service: # systemd module is used to manage systemd services
      name: catalogue
      enabled: true
      state: started
      daemon_reload: true